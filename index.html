<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Cup 2026</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121214;
            color: #ffffff;
            margin: 0;
            padding: 20px;
        }

        .header {
            text-align: center;
            padding: 10px 0;
            background: linear-gradient(180deg, #1c1c1e 0%, #121214 100%);
            border-bottom: 1px solid #2c2c2e;
            margin-bottom: 25px;
        }

        h1 {
            margin: 0;
            font-size: 24px;
            color: #007aff;
        }

        h2 {
            font-size: 20px;
            margin-top: 0;
        }

        #matches-container {
            background-color: #1c1c1e;
            border: 1px solid #2c2c2e;
            border-radius: 12px;
            padding: 15px;
            margin-top: 15px;
            min-height: 100px;
        }

        .match-item {
            padding: 12px;
            border-bottom: 1px solid #2c2c2e;
            font-size: 15px;
        }

        .match-item:last-child {
            border-bottom: none;
        }

        .load-btn {
            background-color: #007aff;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.2s;
        }

        .load-btn:active {
            background-color: #0056b3;
        }

        .error-msg {
            color: #ff3b30;
            font-style: italic;
        }

        .no-matches {
            color: #8e8e93;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>🏆 World Cup 2026</h1>
    </div>

    <div id="matches">
        <h2>📅 Today's Matches</h2>
        <button class="load-btn" onclick="loadTodayMatches()">Load Matches</button>
        
        <div id="matches-container">
            <p style="color: #8e8e93; margin: 0;">Click the button to load live data...</p>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        async function loadTodayMatches() {
            const container = document.getElementById("matches-container");
            container.innerHTML = "<p style='color: #8e8e93; margin: 0;'>Loading live matches data...</p>";

            try {
                // Точный эндпоинт с твоим префиксом /api/
                const response = await fetch("https://world-cup-2026-backend-srlc.onrender.com/api/matches/today"); 
                const data = await response.json();
                container.innerHTML = "";

                if (!data.matches || data.matches.length === 0) {
                    container.innerHTML = "<p class='no-matches'>No matches today.</p>";
                    return;
                }

                data.matches.forEach(match => {
                    const div = document.createElement("div");
                    div.className = "match-item";
                    const date = new Date(match.utcDate);
                    
                    div.textContent = `${date.toLocaleString()} — ${match.homeTeam?.name || 'TBD'} vs ${match.awayTeam?.name || 'TBD'}`;
                    container.appendChild(div);
                });
            } catch (err) {
                console.error("Error loading matches:", err);
                container.innerHTML = "<p class='error-msg'>Error loading matches. Please try again.</p>";
            }
        }
    </script>
</body>
</html>
