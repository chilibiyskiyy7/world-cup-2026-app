<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Cup 2026</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121214;
            color: #ffffff;
            margin: 0;
            padding: 15px;
        }

        .header {
            text-align: center;
            padding: 10px 0;
            margin-bottom: 20px;
        }

        h1 {
            margin: 0;
            font-size: 22px;
            color: #ffffff;
        }

        /* Сетка для кнопок меню как в Телеграме */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 3 колонки в ряд */
            gap: 10px; /* Расстояние между кнопками */
            margin-bottom: 20px;
        }

        /* Стиль кнопок */
        .nav-btn {
            background-color: #1c1c1e;
            color: #ffffff;
            border: 1px solid #2c2c2e;
            border-radius: 10px;
            padding: 12px 5px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            text-align: center;
            transition: background-color 0.1s, transform 0.1s;
        }

        /* Эффект нажатия */
        .nav-btn:active {
            background-color: #2c2c2e;
            transform: scale(0.97);
        }

        /* Активное состояние кнопки */
        .nav-btn.active {
            background-color: #007aff;
            border-color: #007aff;
        }

        /* Контейнер для вывода матчей */
        .section-title {
            font-size: 18px;
            margin: 15px 0 10px 5px;
            color: #8e8e93;
        }

        #data-container {
            background-color: #1c1c1e;
            border: 1px solid #2c2c2e;
            border-radius: 12px;
            padding: 15px;
            min-height: 120px;
        }

        .match-item {
            padding: 12px 0;
            border-bottom: 1px solid #2c2c2e;
            font-size: 14px;
            line-height: 1.4;
        }

        .match-item:last-child {
            border-bottom: none;
        }

        .status-msg {
            color: #8e8e93;
            text-align: center;
            margin-top: 40px;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>🏆 World Cup 2026</h1>
    </div>

    <!-- ТУТ ДОЛЖНЫ БЫТЬ ВСЕ 6 КНОПОК -->
    <div class="menu-grid">
        <button class="nav-btn" id="btn-latest" onclick="loadLatestMatches()">Latest Matches</button>
        <button class="nav-btn" id="btn-today" onclick="loadTodayMatches()">Today's Matches</button>
        <button class="nav-btn" onclick="alert('Coming soon!')">Random Match</button>
        
        <button class="nav-btn" onclick="alert('Coming soon!')">Standings</button>
        <button class="nav-btn" onclick="alert('Coming soon!')">Top Scorers</button>
        <button class="nav-btn" onclick="alert('Coming soon!')">My Predictions</button>
    </div>

    <div class="section-title" id="current-section-title">Matches Data</div>

    <div id="data-container">
        <p class="status-msg">Select a section above to load live data...</p>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const BACKEND_URL = "https://world-cup-2026-backend-srlc.onrender.com";

        function setActiveButton(activeId) {
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            if(activeId) document.getElementById(activeId).classList.add('active');
        }

        // 1. ЗАГРУЗКА СЕГОДНЯШНИХ МАТЧЕЙ
        async function loadTodayMatches() {
            setActiveButton('btn-today');
            document.getElementById("current-section-title").textContent = "📅 Today's Matches";
            const container = document.getElementById("data-container");
            container.innerHTML = "<p class='status-msg'>Loading today's matches...</p>";

            try {
                const response = await fetch(`${BACKEND_URL}/api/matches/today`); 
                const data = await response.json();
                container.innerHTML = "";

                if (!data.matches || data.matches.length === 0) {
                    container.innerHTML = "<p class='status-msg'>No matches scheduled for today.</p>";
                    return;
                }

                data.matches.forEach(match => {
                    const div = document.createElement("div");
                    div.className = "match-item";
                    const date = new Date(match.utcDate);
                    div.textContent = `${date.toLocaleString()} — ${match.home} vs ${match.away}`;
                    container.appendChild(div);
                });
            } catch (err) {
                container.innerHTML = "<p class='status-msg' style='color: #ff3b30;'>Error loading today's matches.</p>";
            }
        }

        // 2. ЗАГРУЗКА ПОСЛЕДНИХ МАТЧЕЙ
        async function loadLatestMatches() {
            setActiveButton('btn-latest');
            document.getElementById("current-section-title").textContent = "🏁 Latest Matches Result";
            const container = document.getElementById("data-container");
            container.innerHTML = "<p class='status-msg'>Loading recent results...</p>";

            try {
                const response = await fetch(`${BACKEND_URL}/api/latest/matches`); 
                const data = await response.json();
                container.innerHTML = "";

                if (!data.matches || data.matches.length === 0) {
                    container.innerHTML = "<p class='status-msg'>No recent matches found.</p>";
                    return;
                }

                data.matches.forEach(match => {
                    const div = document.createElement("div");
                    div.className = "match-item";
                    const date = new Date(match.utcDate);
                    div.textContent = `${date.toLocaleString()} — ${match.home_team} ${match.home_score} : ${match.away_score} ${match.away_team}`;
                    container.appendChild(div);
                });
            } catch (err) {
                container.innerHTML = "<p class='status-msg' style='color: #ff3b30;'>Error loading recent results.</p>";
            }
        }
    </script>
</body>
</html>
